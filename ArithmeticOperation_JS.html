<!DOCTYPE html>
<html>

<head>
    <title>Arithmetic Operations in JavaScript</title>
</head>

<body>

    <h2>Arithmetic Operations in JavaScript</h2>

    <script>
        // Declare two numbers
        let a = 100;
        let b = 50;

        // Addition
        let addition = a + b;

        // Subtraction
        let subtraction = a - b;

        // Multiplication
        let multiplication = a * b;

        // Division
        let division = a / b;

        // Modulus (Remainder)
        let modulus = a % b;

       

        // Display output
        document.write("First Number: " + a + "<br>");
        document.write("Second Number: " + b + "<br><br>");

        document.write("Addition: " + addition + "<br>");
        document.write("Subtraction: " + subtraction + "<br>");
        document.write("Multiplication: " + multiplication + "<br>");
        document.write("Division: " + division + "<br>");
        document.write("Modulus: " + modulus + "<br>");
        
    </script>

</body>

</html>
