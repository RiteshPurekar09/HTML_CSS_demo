<!DOCTYPE html>
<html>

<body>

    <h2>JavaScript If Statement Example</h2>

    <button onclick="checkNumber()">Click Here</button>

    <p id="demo"></p>

    <script>
        function checkNumber() {

            let x = 10;

            if (x > 5) {
                document.getElementById("demo").innerHTML = "x is greater than 5";
            }

        }
    </script>

</body>

</html>
