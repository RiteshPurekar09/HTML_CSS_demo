<!DOCTYPE html>
<html>

<head>
    <title>Submission Successful</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        /* Checkmark animation */
        .checkmark-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid #22c55e; /* Success Green */
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop 0.6s ease;
        }

        .checkmark {
            font-size: 50px;
            color: #22c55e;
            animation: fadeIn 1s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white shadow-2xl rounded-2xl p-12 text-center max-w-lg border border-slate-200 transition-all duration-300">

        <div class="flex justify-center mb-8">
            <div class="checkmark-circle">
                <div class="checkmark">✓</div>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-slate-800 mb-4">
            Your Data Recorded Successfully!
        </h1>

        <p class="text-slate-600 mb-8 leading-relaxed">
            Thank you for reaching out to <span class="text-blue-600 font-bold">Oktacon Softwares</span>. Your data has been recorded securely in our system.
        </p>

        <div class="flex flex-col items-center gap-4">
            <div class="flex items-center gap-2 text-sm text-slate-400">
                <div class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                Redirecting you in 5 seconds...
            </div>
            
            <a href="form.html" class="text-blue-600 font-semibold hover:underline text-sm mt-2">
                Click here if you aren't redirected
            </a>
        </div>

    </div>

    <script>
        setTimeout(function() {
            window.location.href = "form.html";
        }, 5000);
    </script>

</body>

</html>
