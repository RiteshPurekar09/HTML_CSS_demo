<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8fafc; /* Default Light Background */
            transition: background-color 0.5s ease;
        }
        
        /* Default Light Mode Card */
        .success-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- DARK MODE OVERRIDES --- */
        body.dark-mode { background-color: #0f172a; }
        
        body.dark-mode .success-card {
            background: rgba(30, 41, 59, 0.9);
            border-color: #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body.dark-mode .text-main { color: #ffffff; }
        body.dark-mode .text-sub { color: #94a3b8; }
        body.dark-mode .timer-box { background-color: rgba(30, 41, 59, 0.5); border-color: rgba(51, 65, 85, 0.5); }
        body.dark-mode .progress-track { background-color: #334155; }

        /* Animations */
        .check-circle {
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
        }

        @keyframes slideUp {
            0% { transform: translateY(40px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body id="bodyTag" class="min-h-screen flex items-center justify-center p-4">

    <div class="success-card max-w-md w-full rounded-3xl p-10 text-center relative overflow-hidden transition-colors duration-500">
        
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>

        <div class="check-circle w-24 h-24 bg-gradient-to-tr from-emerald-400 to-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg shadow-emerald-500/30 text-white text-4xl">
            <i class="fa-solid fa-check"></i>
        </div>

        <h1 class="text-3xl font-black text-slate-800 text-main mb-4 tracking-tight transition-colors duration-500">Registration Complete!</h1>
        <p class="text-slate-500 text-sub mb-8 leading-relaxed transition-colors duration-500">
            Welcome to Oktacon Softwares. Your account has been successfully created and your data is securely stored.
        </p>

        <div class="timer-box bg-slate-50 rounded-2xl p-4 border border-slate-200 transition-colors duration-500">
            <p class="text-sm font-medium text-slate-500 text-sub transition-colors duration-500">
                Returning to homepage in <span id="countdown" class="text-indigo-500 font-bold text-lg mx-1">5</span> seconds...
            </p>
            
            <div class="progress-track w-full bg-slate-200 h-1.5 rounded-full mt-3 overflow-hidden transition-colors duration-500">
                <div id="progress-bar" class="bg-indigo-500 h-full w-full origin-left"></div>
            </div>
        </div>
        
        <button onclick="goHomeNow()" class="mt-8 text-sm text-slate-400 hover:text-indigo-500 font-medium transition-colors">
            Click here to return immediately
        </button>

    </div>

    <script>
        // --- 1. THEME SYNC LOGIC ---
        // This checks what theme the user picked on index.html and applies it instantly!
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.getElementById('bodyTag').classList.add('dark-mode');
        }

        // --- 2. COUNTDOWN LOGIC ---
        let timeLeft = 5;
        const countdownElement = document.getElementById('countdown');
        const progressBar = document.getElementById('progress-bar');
        
        // Setup the shrinking progress bar animation
        progressBar.style.transition = 'width 5s linear';
        setTimeout(() => {
            progressBar.style.width = '0%';
        }, 50);

        // The timer engine
        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = "index.html";
            }
        }, 1000); 

        // Manual override
        function goHomeNow() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
