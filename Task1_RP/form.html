<!DOCTYPE html>
<html>

<head>
<title>Registration Form</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

<div class="bg-white/80 backdrop-blur-lg shadow-2xl rounded-2xl p-10 w-full max-w-6xl">

<h2 class="text-3xl font-bold text-center text-indigo-600 mb-8">
Registration Form
</h2>

<form action="success.html" method="get" onsubmit="return validateForm()" class="grid grid-cols-4 gap-6">

<!-- First Name -->
<div>
<input type="text" id="fname" placeholder="First Name"
class="w-full border-b-2 border-gray-400 outline-none py-2">
<p id="fnameError" class="text-red-500 text-sm"></p>
</div>

<!-- Middle Name -->
<div>
<input type="text" id="mname" placeholder="Middle Name"
class="w-full border-b-2 border-gray-400 outline-none py-2">
<p id="mnameError" class="text-red-500 text-sm"></p>
</div>

<!-- Last Name -->
<div>
<input type="text" id="lname" placeholder="Last Name"
class="w-full border-b-2 border-gray-400 outline-none py-2">
<p id="lnameError" class="text-red-500 text-sm"></p>
</div>

<!-- Email -->
<div>
<input type="email" id="email" placeholder="Email"
class="w-full border-b-2 border-gray-400 outline-none py-2">
<p id="emailError" class="text-red-500 text-sm"></p>
</div>

<!-- Mobile -->
<div>
<input type="tel" id="mobile" placeholder="Mobile Number"
class="w-full border-b-2 border-gray-400 outline-none py-2">
<p id="mobileError" class="text-red-500 text-sm"></p>
</div>

<!-- DOB -->
<div>
<input type="date" id="dob"
class="w-full border-b-2 border-gray-400 outline-none py-2">
<p id="dobError" class="text-red-500 text-sm"></p>
</div>

<!-- Gender -->
<div class="flex items-center space-x-4">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
</div>

<!-- City -->
<div>
<input type="text" id="city" placeholder="City"
class="w-full border-b-2 border-gray-400 outline-none py-2">
<p id="cityError" class="text-red-500 text-sm"></p>
</div>

<!-- Address -->
<div class="col-span-4">
<textarea id="address" rows="3" placeholder="Address"
class="w-full border-b-2 border-gray-400 outline-none py-2"></textarea>
<p id="addressError" class="text-red-500 text-sm"></p>
</div>

<!-- PIN -->
<div>
<input type="text" id="pin" placeholder="PIN Code"
class="w-full border-b-2 border-gray-400 outline-none py-2">
<p id="pinError" class="text-red-500 text-sm"></p>
</div>

<!-- Buttons -->
<div class="col-span-4 flex justify-center gap-6 mt-6">

<button type="submit"
class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2 rounded-lg shadow-md">
Submit
</button>

<button type="reset"
class="bg-red-500 hover:bg-red-600 text-white px-8 py-2 rounded-lg shadow-md">
Reset
</button>

</div>

</form>

</div>

<script>

function validateForm(){

let valid=true;

let fname=document.getElementById("fname").value.trim();
let mname=document.getElementById("mname").value.trim();
let lname=document.getElementById("lname").value.trim();
let email=document.getElementById("email").value.trim();
let mobile=document.getElementById("mobile").value.trim();
let dob=document.getElementById("dob").value;
let city=document.getElementById("city").value.trim();
let address=document.getElementById("address").value.trim();
let pin=document.getElementById("pin").value.trim();

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

/* First Name */
if(fname==""){
document.getElementById("fnameError").innerText="First name required";
valid=false;
}else{
document.getElementById("fnameError").innerText="";
}

/* Middle Name */
if(mname==""){
document.getElementById("mnameError").innerText="Middle name required";
valid=false;
}else{
document.getElementById("mnameError").innerText="";
}

/* Last Name */
if(lname==""){
document.getElementById("lnameError").innerText="Last name required";
valid=false;
}else{
document.getElementById("lnameError").innerText="";
}

/* Email */
if(!email.match(emailPattern)){
document.getElementById("emailError").innerText="Invalid email format";
valid=false;
}else{
document.getElementById("emailError").innerText="";
}

/* Mobile */
if(mobile.length!=10 || isNaN(mobile)){
document.getElementById("mobileError").innerText="Mobile must be 10 digits";
valid=false;
}else{
document.getElementById("mobileError").innerText="";
}

/* DOB */
if(dob==""){
document.getElementById("dobError").innerText="Select your date of birth";
valid=false;
}else{
document.getElementById("dobError").innerText="";
}

/* City */
if(city==""){
document.getElementById("cityError").innerText="City required";
valid=false;
}else{
document.getElementById("cityError").innerText="";
}

/* Address */
if(address==""){
document.getElementById("addressError").innerText="Address required";
valid=false;
}else{
document.getElementById("addressError").innerText="";
}

/* PIN */
if(pin.length!=6 || isNaN(pin)){
document.getElementById("pinError").innerText="PIN must be 6 digits";
valid=false;
}else{
document.getElementById("pinError").innerText="";
}

/* Gender */
let gender=document.getElementsByName("gender");
let genderSelected=false;

for(let i=0;i<gender.length;i++){
if(gender[i].checked){
genderSelected=true;
}
}

if(!genderSelected){
alert("Please select gender");
valid=false;
}

return valid;

}

</script>

</body>
</html>
